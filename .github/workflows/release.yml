name: Release

# Trigger: push a semver tag  →  git tag v0.3.2 && git push origin v0.3.2
# Or run manually from the Actions tab and provide the version.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"          # e.g. v0.3.2  (release)
      - "v[0-9]+.[0-9]+.[0-9]+-RC[0-9]+" # e.g. v0.4.0-RC1 (release candidate)
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without 'v', e.g. 0.3.2)"
        required: true
        type: string

jobs:
  release:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Release

    steps:
      # ── 1. Resolve version ───────────────────────────────────────────────────
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            # Strip leading 'v' from the tag name
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      # ── 2. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 3. Java + Maven cache ────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── 4. Import GPG signing key ────────────────────────────────────────────
      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          # Pre-set the passphrase so maven-gpg-plugin (loopback mode) can use it
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent
          gpg --list-secret-keys --keyid-format LONG

      # ── 5. Configure Maven settings (Maven Central credentials) ──────────────
      - name: Configure Maven settings
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
            <servers>
              <server>
                <id>central</id>
                <username>${MAVEN_CENTRAL_USERNAME}</username>
                <password>${MAVEN_CENTRAL_TOKEN}</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>gpg</id>
                <properties>
                  <gpg.passphrase>${GPG_PASSPHRASE}</gpg.passphrase>
                </properties>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>gpg</activeProfile>
            </activeProfiles>
          </settings>
          EOF

      # ── 6. Build, sign and publish ───────────────────────────────────────────
      - name: Deploy to Maven Central
        run: |
          mvn -B clean deploy \
            -Prelease \
            -Drevision=${{ steps.ver.outputs.VERSION }} \
            -f fractalx-parent/pom.xml

      # ── 7. Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "FractalX ${{ steps.ver.outputs.VERSION }}"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.VERSION, 'RC') }}

      # ── 8. (Optional) Bump parent POM to next SNAPSHOT ───────────────────────
      # Uncomment this step if you want the version bump committed automatically.
      # Requires a PAT with push access stored as RELEASE_TOKEN.
      #
      # - name: Bump to next SNAPSHOT
      #   run: |
      #     NEXT=$(echo "${{ steps.ver.outputs.VERSION }}" | awk -F. '{$NF=$NF+1; print}' OFS=.)
      #     sed -i "s|<revision>.*</revision>|<revision>${NEXT}-SNAPSHOT</revision>|" fractalx-parent/pom.xml
      #     git config user.email "github-actions[bot]@users.noreply.github.com"
      #     git config user.name  "github-actions[bot]"
      #     git add fractalx-parent/pom.xml
      #     git commit -m "chore: bump version to ${NEXT}-SNAPSHOT [skip ci]"
      #     git push origin HEAD:main
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
