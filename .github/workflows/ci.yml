name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]   # release.yml handles tags
  pull_request:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn -B verify -f fractalx-parent/pom.xml
